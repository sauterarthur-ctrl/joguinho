<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 RACING CUSTOM — Sua Ferrari vs Carro Inimigo</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 40%, #0a0a12, #010103);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Rajdhani', 'Orbitron', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 18px 24px 28px 24px;
            box-shadow: 0 40px 60px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.08);
            border: 1px solid rgba(255, 80, 40, 0.7);
        }

        .dashboard {
            background: #0a0f16ee;
            border-radius: 48px;
            padding: 12px 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 5px rgba(0,0,0,0.7), 0 12px 20px rgba(0,0,0,0.5);
            border-bottom: 3px solid #ff4d2e;
        }

        .metric {
            background: #010d12cc;
            padding: 6px 24px;
            border-radius: 40px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-weight: 800;
            font-family: 'Rajdhani', monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px #00000066, 0 3px 6px black;
        }

        .metric span:first-child {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #ffb86b;
            font-weight: 600;
        }

        .metric span:last-child {
            font-size: 2rem;
            font-weight: 900;
            color: #fff0c0;
            text-shadow: 0 0 8px #ff5722;
        }

        .race-track {
            background: #101b1e;
            border-radius: 36px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #ff6a2e, inset 0 0 0 7px #2c2418, 0 24px 36px black;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #1b2a2c;
            border-radius: 28px;
            box-shadow: 0 14px 26px rgba(0,0,0,0.8);
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        .ctrl-btn {
            background: #2f3a2c;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 10px 34px;
            border-radius: 100px;
            color: #ffefcf;
            font-family: 'Rajdhani', monospace;
            box-shadow: 0 7px 0 #11180e;
            cursor: pointer;
            transition: 0.04s linear;
            letter-spacing: 2px;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #11180e;
        }

        .restart-btn {
            background: #c23a22;
            box-shadow: 0 7px 0 #691f0f;
        }

        .status-area {
            background: #02070bdd;
            border-radius: 44px;
            text-align: center;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 1rem;
            color: #ffc285;
            font-family: monospace;
            backdrop-filter: blur(5px);
            border: 1px solid #ff784e;
        }

        .info-text {
            font-size: 0.7rem;
            background: #0c0e12cc;
            padding: 4px 18px;
            border-radius: 28px;
            margin-top: 14px;
            color: #dde6e8;
            text-align: center;
        }

        @media (max-width: 760px) {
            .metric span:last-child { font-size: 1.3rem; }
            .ctrl-btn { font-size: 1.1rem; padding: 6px 18px; }
            .game-container { padding: 12px 16px 20px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="dashboard">
            <div class="metric">🏁 SCORE <span id="scoreValue">0</span></div>
            <div class="metric">⚡ KM/H <span id="speedValue">0</span></div>
            <div class="metric">🏆 BEST <span id="bestValue">0</span></div>
        </div>

        <div class="race-track">
            <canvas id="gameCanvas" width="1000" height="500"></canvas>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="upBtn">▲ CIMA</button>
            <button class="ctrl-btn restart-btn" id="restartBtn">🔄 REINICIAR</button>
            <button class="ctrl-btn" id="downBtn">▼ BAIXO</button>
        </div>
        <div class="status-area" id="gameStatusText">
            🏎️ IMAGENS PERSONALIZADAS | Use ▲▼ para mover | Velocidade explosiva
        </div>
        <div class="info-text">
            ⚡ PARA TROCAR AS IMAGENS: substitua os BASE64 no código (locais sinalizados)
        </div>
    </div>
</div>

<script>
    (function(){
        // ============================================================
        // ⭐↓↓↓ COLE AQUI O BASE64 DA SUA FERRARI (CARRO DO JOGADOR) ↓↓↓⭐
        // Exemplo: "data:image/png;base64,iVBORw0KGgoAAAANS..."
        // ============================================================
        const PLAYER_IMAGE_BASE64 = "";  // <--- COLE A FERRARI AQUI
        
        // ============================================================
        // ⭐↓↓↓ COLE AQUI O BASE64 DO CARRO INIMIGO (TODOS INIMIGOS) ↓↓↓⭐
        // Todos os carros adversários usarão esta mesma imagem
        // ============================================================
        const ENEMY_IMAGE_BASE64 = "";   // <--- COLE A IMAGEM DO INIMIGO AQUI
        // ============================================================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Carregar imagem do jogador (Ferrari)
        let playerImage = new Image();
        let usePlayerImage = false;
        if (PLAYER_IMAGE_BASE64 && PLAYER_IMAGE_BASE64.trim() !== "") {
            playerImage.src = PLAYER_IMAGE_BASE64;
            usePlayerImage = true;
            console.log("Imagem do JOGADOR (Ferrari) carregada!");
        } else { console.warn("Nenhuma imagem para o JOGADOR. Usando desenho padrão."); }
        
        // Carregar imagem do inimigo
        let enemyImage = new Image();
        let useEnemyImage = false;
        if (ENEMY_IMAGE_BASE64 && ENEMY_IMAGE_BASE64.trim() !== "") {
            enemyImage.src = ENEMY_IMAGE_BASE64;
            useEnemyImage = true;
            console.log("Imagem do INIMIGO carregada!");
        } else { console.warn("Nenhuma imagem para o INIMIGO. Usando desenho padrão."); }
        
        // Dimensões pista horizontal
        const TRACK_HEIGHT = canvas.height;
        const LANE_COUNT = 5;
        const LANE_HEIGHT = TRACK_HEIGHT / LANE_COUNT;
        
        // Carro do jogador
        const CAR_WIDTH = 72;
        const CAR_HEIGHT = 58;
        
        // Inimigos
        const ENEMY_W = 68;
        const ENEMY_H = 56;
        
        let currentLane = 2;
        let score = 0;
        let bestScore = 0;
        let gameRunning = true;
        let animationId;
        
        let enemies = [];
        let particles = [];
        
        // Sistema de velocidade acelerada
        let baseSpeed = 2.4;
        let currentEnemySpeed = baseSpeed;
        let framesSinceLastSpawn = 0;
        let spawnDelayFrames = 34;
        let scoreCounter = 0;
        
        // Carregar melhor pontuação
        try {
            const saved = localStorage.getItem('custom_racing_best');
            if(saved && !isNaN(parseInt(saved))) bestScore = parseInt(saved);
        } catch(e) {}
        document.getElementById('bestValue').innerText = bestScore;
        
        // ========== DESENHO DO JOGADOR (FERRARI ou FALLBACK) ==========
        function drawPlayerCar() {
            const playerX = canvas.width - CAR_WIDTH - 30;
            const playerY = currentLane * LANE_HEIGHT + (LANE_HEIGHT/2) - CAR_HEIGHT/2;
            
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "rgba(0,0,0,0.9)";
            
            if (usePlayerImage && playerImage.complete && playerImage.naturalWidth > 0) {
                try { ctx.drawImage(playerImage, playerX, playerY, CAR_WIDTH, CAR_HEIGHT); }
                catch(e) { drawFallbackPlayer(playerX, playerY); }
            } else { drawFallbackPlayer(playerX, playerY); }
            
            ctx.restore();
        }
        
        // Fallback: desenho vetorial estilo Ferrari
        function drawFallbackPlayer(x, y) {
            ctx.fillStyle = "#D43F1F";
            ctx.beginPath(); ctx.roundRect(x, y, CAR_WIDTH, CAR_HEIGHT, 10); ctx.fill();
            ctx.fillStyle = "#A52A1A";
            ctx.fillRect(x+8, y+12, 6, CAR_HEIGHT-24);
            ctx.fillRect(x+CAR_WIDTH-14, y+12, 6, CAR_HEIGHT-24);
            ctx.fillStyle = "#FFB347";
            ctx.fillRect(x+CAR_WIDTH-12, y+12, 9, 10);
            ctx.fillRect(x+CAR_WIDTH-12, y+CAR_HEIGHT-22, 9, 10);
            ctx.fillStyle = "#F78C4A";
            ctx.fillRect(x+CAR_WIDTH-18, y+CAR_HEIGHT/2-5, 12, 10);
        }
        
        // ========== DESENHO DOS INIMIGOS (imagem personalizada ou fallback) ==========
        function drawEnemies() {
            for(let enemy of enemies) {
                const enemyY = enemy.lane * LANE_HEIGHT + (LANE_HEIGHT/2) - ENEMY_H/2;
                const enemyX = enemy.x;
                
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "black";
                
                if (useEnemyImage && enemyImage.complete && enemyImage.naturalWidth > 0) {
                    try { ctx.drawImage(enemyImage, enemyX, enemyY, ENEMY_W, ENEMY_H); }
                    catch(e) { drawFallbackEnemy(enemyX, enemyY); }
                } else { drawFallbackEnemy(enemyX, enemyY); }
                
                ctx.restore();
            }
        }
        
        // Fallback para inimigo (carro genérico escuro)
        function drawFallbackEnemy(x, y) {
            ctx.fillStyle = "#2C4760";
            ctx.beginPath(); ctx.roundRect(x, y, ENEMY_W, ENEMY_H, 10); ctx.fill();
            ctx.fillStyle = "#1A2F40";
            ctx.fillRect(x+8, y-4, ENEMY_W-16, 14);
            ctx.fillStyle = "#8FB8D4";
            ctx.fillRect(x+10, y+6, 12, 18);
            ctx.fillRect(x+ENEMY_W-22, y+6, 12, 18);
            ctx.fillStyle = "#F3CD81";
            ctx.fillRect(x+ENEMY_W-12, y+8, 9, 9);
        }
        
        // Pista e efeitos (mantido igual)
        function drawTrack() {
            ctx.fillStyle = "#1F282C";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0;i<1500;i++) {
                ctx.fillStyle = `rgba(100, 95, 70, ${Math.random() * 0.3})`;
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
            ctx.lineWidth = 3;
            ctx.setLineDash([18, 26]);
            ctx.strokeStyle = "#FFAA55";
            for(let i=1; i<LANE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * LANE_HEIGHT);
                ctx.lineTo(canvas.width, i * LANE_HEIGHT);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#E8853C";
            ctx.strokeRect(12, 12, canvas.width-24, canvas.height-24);
            for(let i=0; i<14; i++) {
                if(i%2 === 0) ctx.fillStyle = "#FF7F3F";
                else ctx.fillStyle = "#A55A2A";
                ctx.fillRect(canvas.width-48, i*42 + 15, 14, 28);
            }
            ctx.font = "bold 20px 'Rajdhani'";
            ctx.fillStyle = "#FFAA66";
            ctx.shadowBlur = 4;
            ctx.fillText("→ CUSTOM RACING", canvas.width-180, 55);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#E09D55";
            ctx.fillText("IMAGENS PERSONALIZADAS", 24, 45);
            ctx.shadowBlur = 0;
        }
        
        // Partículas e efeitos de velocidade
        function addBoostParticles() {
            if(!gameRunning) return;
            if(Math.random() < Math.min(0.95, currentEnemySpeed / 9.0)) {
                const playerY = currentLane * LANE_HEIGHT + (LANE_HEIGHT/2);
                const playerX = canvas.width - CAR_WIDTH - 30;
                particles.push({ x: playerX - 5 + Math.random() * 12, y: playerY - 12 + Math.random() * 32, life: 0.9, size: 3+Math.random()*8, vx: -Math.random()*4-2.5, vy: (Math.random()-0.5)*1.8 });
            }
            for(let i=0;i<particles.length;i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.035;
                if(particles[i].life <= 0 || particles[i].x < -40) particles.splice(i,1);
            }
        }
        function drawParticles() { for(let p of particles) { ctx.fillStyle = `rgba(210,100,40,${p.life*0.8})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.7,0,Math.PI*2); ctx.fill(); } }
        
        function checkCollision() {
            const playerX = canvas.width - CAR_WIDTH - 30;
            const playerY = currentLane * LANE_HEIGHT + (LANE_HEIGHT/2) - CAR_HEIGHT/2;
            for(let enemy of enemies) {
                const enemyY = enemy.lane * LANE_HEIGHT + (LANE_HEIGHT/2) - ENEMY_H/2;
                const enemyX = enemy.x;
                if(playerX < enemyX+ENEMY_W && playerX+CAR_WIDTH > enemyX && playerY < enemyY+ENEMY_H && playerY+CAR_HEIGHT > enemyY) return true;
            }
            return false;
        }
        
        function updateExtremeDifficulty() {
            if(!gameRunning) return;
            let pointsPerFrame = 0.09 + (currentEnemySpeed / 42);
            scoreCounter += pointsPerFrame;
            if(scoreCounter >= 1) { 
                let gain = Math.floor(scoreCounter); 
                score += gain; 
                scoreCounter -= gain; 
                document.getElementById('scoreValue').innerText = Math.floor(score);
                if(score > bestScore) { bestScore = score; document.getElementById('bestValue').innerText = bestScore; localStorage.setItem('custom_racing_best', bestScore); } 
            }
            currentEnemySpeed += 0.028;  // Aumento mais rápido
            if(currentEnemySpeed > 22.0) currentEnemySpeed = 22.0;
            spawnDelayFrames = Math.max(16, 40 - Math.floor(currentEnemySpeed * 1.5));
            let kmh = Math.floor(currentEnemySpeed * 20);
            document.getElementById('speedValue').innerText = kmh;
        }
        
        function trySpawnEnemy() {
            framesSinceLastSpawn++;
            if(framesSinceLastSpawn >= spawnDelayFrames) {
                framesSinceLastSpawn = 0;
                let blockedLanes = new Set();
                for(let e of enemies) if(e.x < 150) blockedLanes.add(e.lane);
                let freeLanes = []; for(let i=0;i<LANE_COUNT;i++) if(!blockedLanes.has(i)) freeLanes.push(i);
                let laneChoice = freeLanes.length ? freeLanes[Math.floor(Math.random()*freeLanes.length)] : Math.floor(Math.random()*LANE_COUNT);
                enemies.push({ lane: laneChoice, x: -ENEMY_W - Math.random() * 60 });
            }
        }
        
        function moveEnemies() { for(let e of enemies) e.x += currentEnemySpeed; enemies = enemies.filter(e => e.x < canvas.width + 250); }
        function drawSpeedLinesExtreme() { if(currentEnemySpeed > 8.5) for(let i=0;i<65;i++) { ctx.fillStyle = `rgba(255,160,60,${Math.random()*0.5})`; ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 3, 22); } }
        
        function endGame() { 
            gameRunning = false; 
            document.getElementById('gameStatusText').innerHTML = `💥 CRASH! SCORE: ${Math.floor(score)}. APERTE REINICIAR 💥`;
            if(animationId) cancelAnimationFrame(animationId);
            renderFullFrame();
        }
        
        function renderFullFrame() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawTrack();
            drawEnemies();
            drawPlayerCar();
            drawParticles();
            drawSpeedLinesExtreme();
            if(!gameRunning) {
                ctx.font = "900 46px 'Rajdhani'";
                ctx.fillStyle = "#FF6030";
                ctx.fillText("GAME OVER", canvas.width/2-130, canvas.height/2-50);
                ctx.font = "bold 26px monospace";
                ctx.fillStyle = "#FFCD94";
                ctx.fillText("🔁 REINICIAR (R)", canvas.width/2-110, canvas.height/2+50);
                ctx.fillText(`PONTOS: ${Math.floor(score)}`, canvas.width/2-75, canvas.height/2+120);
            }
        }
        
        function gameLoop() {
            if(!gameRunning) { renderFullFrame(); return; }
            trySpawnEnemy();
            moveEnemies();
            if(checkCollision()) { endGame(); return; }
            updateExtremeDifficulty();
            addBoostParticles();
            renderFullFrame();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function moveUp() { if(gameRunning && currentLane > 0) { currentLane--; renderFullFrame(); } }
        function moveDown() { if(gameRunning && currentLane < LANE_COUNT-1) { currentLane++; renderFullFrame(); } }
        
        function restartRace() {
            gameRunning = true;
            score = 0; scoreCounter = 0;
            currentEnemySpeed = baseSpeed;
            enemies = []; particles = [];
            framesSinceLastSpawn = 5;
            currentLane = 2;
            document.getElementById('scoreValue').innerText = "0";
            document.getElementById('speedValue').innerText = "0";
            document.getElementById('gameStatusText').innerHTML = "🏁 REINICIADO! Use ▲▼ para mover. Suas imagens personalizadas!";
            if(animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function handleKeyboard(e) {
            if(e.key === 'ArrowUp' || e.key === 'Up' || e.key === 'w') { e.preventDefault(); moveUp(); }
            else if(e.key === 'ArrowDown' || e.key === 'Down' || e.key === 's') { e.preventDefault(); moveDown(); }
            else if(e.key === 'r' || e.key === 'R' || (e.key === ' ' && !gameRunning)) { e.preventDefault(); restartRace(); }
        }
        
        function bindButtons() {
            document.getElementById('upBtn').addEventListener('click', () => moveUp());
            document.getElementById('downBtn').addEventListener('click', () => moveDown());
            document.getElementById('restartBtn').addEventListener('click', () => restartRace());
            window.addEventListener('keydown', handleKeyboard);
        }
        
        // Polyfill roundRect
        if(!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
                if(w<2*r) r=w/2; if(h<2*r) r=h/2;
                this.moveTo(x+r,y); this.lineTo(x+w-r,y);
                this.quadraticCurveTo(x+w,y,x+w,y+r);
                this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
                this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
                this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
                return this;
            };
        }
        
        bindButtons();
        restartRace();
    })();
</script>
</body>
</html>
